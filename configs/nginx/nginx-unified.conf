# ==============================================
# BHP Unified Gateway — xingjian.krwh.com
# Single domain, path-based routing for all apps
# ==============================================
#
# URL Map:
#   /              → H5 Main (bhp-h5)           Observer/Grower/Sharer [已上线]
#   /landing       → Landing Page (admin-portal)  平台首页/行业展示
#   /behavior/     → H5 Behavior (bhp-behavior)   行为评估流程
#   /staff/        → Staff Portal                  内部管理 (H5 SPA内置)
#   /vision/       → Youth Vision [RESERVED]       青少年视力科学
#   /agent/        → Expert Agent [RESERVED]       专家个性化Agent
#   /api/          → FastAPI Backend               统一API
#   /ws/           → WebSocket                     长连接
#
# Disk layout (/srv/apps/):
#   /srv/apps/h5/           ← h5 build (npm run build)
#   /srv/apps/landing/      ← admin-portal build
#   /srv/apps/h5-behavior/  ← h5-behavior build
#   /srv/apps/vision/       ← [future]
#   /srv/apps/agent/        ← [future]
#
# WeChat Mini-Program:
#   Calls /api/ directly (same backend). Domain whitelist: xingjian.krwh.com
# ==============================================

resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name xingjian.krwh.com _;

    # -- Global --
    client_max_body_size 20M;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/xml+rss image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/bhp-access.log;
    error_log  /var/log/nginx/bhp-error.log;

    # Dynamic DNS for backend
    set $backend http://bhp-api:8000;

    # ========================================
    # 1. API / WebSocket / Chat  (highest priority)
    # ========================================

    # WeChat chat — strict 5s timeout + fallback
    location /api/v1/chat {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout    3s;
        proxy_send_timeout    3s;
        proxy_buffering off;
        proxy_intercept_errors on;
        error_page 502 503 504 =200 @chat_fallback;
    }

    location @chat_fallback {
        default_type application/json;
        return 200 '{"status":"OFFLINE_HEALTH_MODE","response":"AI教练正在恢复中，请稍后再试。","fallback":true,"session_id":"fallback"}';
    }

    # API static files (avatars, uploads)
    location ^~ /api/static/ {
        proxy_pass $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API
    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_intercept_errors on;
        error_page 502 503 504 =503 @api_fallback;
    }

    location @api_fallback {
        default_type application/json;
        return 503 '{"error":"ServiceUnavailable","message":"服务暂时不可用","fallback":true}';
    }

    # WebSocket
    location /ws/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Health checks (suppress logs)
    location /health {
        proxy_pass $backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
    location /ready {
        proxy_pass $backend/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ========================================
    # 2. Landing Page — /landing
    #    Platform homepage (industry verticals)
    # ========================================
    location /landing {
        alias /srv/apps/landing;
        try_files $uri $uri/ /landing/index.html;

        location ~* ^/landing/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /srv/apps/landing;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================
    # 3. H5 Behavior — /behavior/
    #    Behavioral assessment flow (hash mode)
    # ========================================
    location /behavior/ {
        alias /srv/apps/h5-behavior/;
        try_files $uri $uri/ /behavior/index.html;

        location ~* ^/behavior/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /srv/apps/h5-behavior/;
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========================================
    # 4. Youth Vision — /vision/ [RESERVED]
    # ========================================
    # location /vision/ {
    #     alias /srv/apps/vision/;
    #     try_files $uri $uri/ /vision/index.html;
    #     location ~* ^/vision/assets/ {
    #         alias /srv/apps/vision/;
    #         try_files $uri =404;
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }

    # ========================================
    # 5. Expert Agent — /agent/ [RESERVED]
    # ========================================
    # location /agent/ {
    #     alias /srv/apps/agent/;
    #     try_files $uri $uri/ /agent/index.html;
    #     location ~* ^/agent/assets/ {
    #         alias /srv/apps/agent/;
    #         try_files $uri =404;
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    # }

    # ========================================
    # 6. H5 Main — / (root, SPA fallback)
    #    Observer/Grower/Sharer — ALREADY LIVE
    #    Also handles /staff/* routes (same SPA)
    # ========================================

    # H5 static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /srv/apps/h5;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # H5 index — no cache
    location = / {
        root /srv/apps/h5;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    # H5 SPA fallback (all remaining routes: /home/*, /staff/*, /login, etc.)
    location / {
        root /srv/apps/h5;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
