# ── behavior_rx (BehaviorRxAgent, priority=2) ────────────────
agent_id: behavior_rx
agent_class: BehaviorRxAgent
tier: 3
priority: 2
notes: "铁律：所有处方必须进入coach_review_queue，禁止直接推送"

retrieval_rules:

  - rule_id: BXRX-R001
    name: 行为处方六要素生成
    trigger_condition:
      signal: rx_generation_triggered
    retrieval_query: "行为处方六要素 BCT策略 改变阶段处方匹配"
    target_ki: [KI-CD-008, KI-BCT-FOGG-001, KI-LEARN-ILL-001]
    expected_output: 基于六要素的结构化行为处方
    priority: P0

  - rule_id: BXRX-R002
    name: 高血压行为处方
    trigger_condition:
      signal: diagnosis_htn
    retrieval_query: "高血压生活方式干预 行为改变 限盐运动减压综合"
    target_ki: [KI-HTN-002, KI-HTN-003, KI-HTN-007, KI-HTN-008, KI-CD-008]
    expected_output: 高血压综合行为处方（饮食+运动+压力管理）
    priority: P0

  - rule_id: BXRX-R003
    name: 高脂血症行为处方
    trigger_condition:
      signal: diagnosis_hlp
    retrieval_query: "高脂血症生活方式干预 饮食运动行为处方"
    target_ki: [KI-HLP-002, KI-HLP-005, KI-HLP-007, KI-CD-008]
    expected_output: 高脂血症综合行为处方
    priority: P0

  - rule_id: BXRX-R004
    name: 减重行为处方
    trigger_condition:
      signal: diagnosis_obesity
    retrieval_query: "肥胖生活方式干预 减重行为处方 综合干预"
    target_ki: [KI-OBE-003, KI-OBE-005, KI-OBE-006, KI-CD-008]
    expected_output: 减重综合行为处方（热量+运动+行为规范）
    priority: P0

  - rule_id: BXRX-R005
    name: 戒烟戒酒处方
    trigger_condition:
      keywords_any: ["戒烟","戒酒","抽烟","喝酒","成瘾","依赖","控制不住"]
    retrieval_query: "成瘾行为干预 戒断处方 替代行为 复发预防"
    target_ki: [KI-PSYCH-BURG-002, KI-BCT-FOGG-001, KI-OBE-009]
    expected_output: 成瘾行为干预处方 + 复发应对计划
    priority: P0

  - rule_id: BXRX-R006
    name: 文化适配处方调整
    trigger_condition:
      signal: cultural_profile_detected
    retrieval_query: "文化因素行为处方 中国情境 饮食文化 地域习惯"
    target_ki: [KI-CULT-HUM-001, KI-HTN-009, KI-HLP-008]
    expected_output: 文化适配版处方内容
    priority: P1


