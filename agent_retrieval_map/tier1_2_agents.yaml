# ── crisis (CrisisAgent, priority=0) ────────────────────────
agent_id: crisis
agent_class: CrisisAgent
tier: 1
priority: 0

retrieval_rules:

  - rule_id: CRISIS-R001
    name: 心理危机识别
    trigger_condition:
      keywords_any: ["不想活了","活着没意思","自杀","自伤","崩溃","消失","撑不住了"]
    retrieval_query: "心理危机干预 自杀预防 情绪支持"
    target_ki: [KI-PSYCH-BURG-002]
    expected_output: 危机干预话术 + 立即转介
    priority: P0
    notes: "最高优先级，触发安全四层管道，不等KI检索直接响应"

  - rule_id: CRISIS-R002
    name: 慢病绝望干预
    trigger_condition:
      keywords_any: ["得了糖尿病活不下去","慢性病绝望","治不好了","放弃治疗","没有未来"]
    retrieval_query: "慢性病心理创伤 疾病适应 希望重建"
    target_ki: [KI-PSYCH-BURG-002, KI-CD-009]
    expected_output: 慢病接受框架 + 希望重建话术
    priority: P0

  - rule_id: CRISIS-R003
    name: 血糖急症处理
    trigger_condition:
      keywords_any: ["低血糖","血糖很高","手抖","出冷汗","意识模糊","晕了"]
    retrieval_query: "低血糖急症处理 血糖危机应对"
    target_ki: [KI-DM-CGM-003, KI-DM-CGM-004]
    expected_output: 急症应对指导（引导立即就医）
    priority: P0


---
# ── glucose (GlucoseAgent, priority=1) ──────────────────────
agent_id: glucose
agent_class: GlucoseAgent
tier: 2
priority: 1

retrieval_rules:

  - rule_id: GLU-R001
    name: 血糖监测方法咨询
    trigger_condition:
      keywords_any: ["怎么监测血糖","血糖仪","CGM","扫描式","监测频率","什么时候测"]
    retrieval_query: "血糖监测方法 CGM SMBG HbA1c 选择原则"
    target_ki: [KI-DM-CGM-001, KI-DM-CGM-003]
    expected_output: 个体化监测方案 + 设备选择指南
    priority: P0

  - rule_id: GLU-R002
    name: CGM数据解读
    trigger_condition:
      signal: cgm_data_received
      keywords_any: ["血糖数据","TIR","波动","达标","时间在范围内"]
    retrieval_query: "TIR目标值 CGM波动解读 血糖达标"
    target_ki: [KI-DM-CGM-003, KI-DM-CGM-004]
    expected_output: 数据解读报告 + 干预建议
    priority: P0

  - rule_id: GLU-R003
    name: 糖尿病逆转咨询
    trigger_condition:
      ttm_stage: [S0, S1]
      keywords_any: ["能逆转吗","能停药吗","治好了","不用吃药","糖尿病逆转"]
    retrieval_query: "T2D逆转标准 生活方式逆转证据 临床缓解"
    target_ki: [KI-ACLM-001, KI-CD-009]
    expected_output: 逆转可能性循证说明 + 路径概述
    priority: P0

  - rule_id: GLU-R004
    name: 高血压合并血糖异常
    trigger_condition:
      keywords_any: ["高血压","血压高","血糖血压都高","合并症"]
    retrieval_query: "高血压血糖合并管理 代谢综合征 综合干预"
    target_ki: [KI-HTN-002, KI-HTN-007, KI-DM-CGM-001]
    expected_output: 合并症综合管理方案
    priority: P1

  - rule_id: GLU-R005
    name: 血脂血糖合并
    trigger_condition:
      keywords_any: ["血脂高","胆固醇","甘油三酯","血脂血糖","代谢综合征"]
    retrieval_query: "高脂血症血糖合并 代谢综合征 综合饮食干预"
    target_ki: [KI-HLP-002, KI-HLP-007, KI-DM-CGM-001]
    expected_output: 血糖血脂双管齐下方案
    priority: P1


